<div class="container">
  <div class="row">
    <div class="span12">
      <ul class="portfolio-categ filter">
        <li class="all" [ngClass]="{'active': isActiveCategory(0)}" (click)="selectCategory(0)"><a class="category-filter">All</a></li>
        <li class="web" [ngClass]="{'active': isActiveCategory(1)}" (click)="selectCategory(1)"><a class="category-filter">Sports</a></li>
        <li class="icon" [ngClass]="{'active': isActiveCategory(2)}" (click)="selectCategory(2)"><a class="category-filter">Concerts</a></li>
        <li class="graphic" [ngClass]="{'active': isActiveCategory(3)}" (click)="selectCategory(3)"><a class="category-filter">Theater</a></li>
      </ul>

      <div class="clearfix"></div>
      <p class="empty-list-description" *ngIf="eventList.length === 0">There are no events in this section.</p>
      <div class="row">
        <section id="projects">
          <ul id="thumbs" class="grid cs-style-4 portfolio">

            <li *ngFor="let eventItem of eventList" (click)="goToDetails(eventItem.id)" class="item-thumbs span3 design" data-type="icon">
              <div class="event-box item">
                <figure>
                  <div><img src="{{eventItem.imagePath}}" alt="" /></div>
                  <figcaption>
                    <div>
                      <span class="ticket-prices">
                        <p class="ticket-prices-label">Tickets from</p>
                        <p class="ticket-prices-value">${{eventItem.price}}</p>
                      </span>
                      <span>
                        <a class="btn btn-rounded  btn-buy-ticket">
                          Buy
                          <i class="icon-angle-right"></i>
                        </a>
                      </span>
                    </div>
                  </figcaption>
                </figure>
                <div class="details">
                  <h1 class="title">{{eventItem.title}}</h1>
                  <p class="location"><i class="icon-location-arrow"></i><span>{{eventItem.location}}</span></p>
                  <p class="date"><i class="icon-calendar"></i><span>{{eventItem.date | date:'mediumDate'}}</span></p>
                </div>
              </div>
            </li>

          </ul>
        </section>

      </div>
    </div>
  </div>
</div>
