version: '3.4'

services:
  ticketr.api:
    image: ${DOCKER_REGISTRY}ticketrapi
    build:
      context: .
      dockerfile: TicketR.Api/Dockerfile
    environment:
      - ASPNETCORE_ENVIRONMENT=Development
      - ASPNETCORE_URLS=http://+:5000
    ports:
      - "5000:5000"

  ticketr.services.events:
    image: ${DOCKER_REGISTRY}ticketrservicesevents
    build:
      context: .
      dockerfile: TicketR.Services.Events/Dockerfile
    environment:
      - ASPNETCORE_ENVIRONMENT=Development
      - ASPNETCORE_URLS=http://+:5001
    ports:
      - "5001:5001"

  ticketr.services.account:
    image: ${DOCKER_REGISTRY}ticketrservicesaccount
    build:
      context: .
      dockerfile: TicketR.Services.Account/Dockerfile
    environment:
      - ASPNETCORE_ENVIRONMENT=Development
      - ASPNETCORE_URLS=http://+:5002
    ports:
      - "5002:5002"
    depends_on:
      - accountDb

  accountDb:
    image: "microsoft/mssql-server-linux"
    environment:
      SA_PASSWORD: "Testing_123"
      ACCEPT_EULA: "Y"
    ports:
      - "11433:1433"
